spring.application.name=edukacija-service

server.port=8084

#spring.config.import=optional:configserver:http://config-server:8888
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
#eureka.client.service-url.defaulZone=http://localhost:8761/eureka

resilience4j.circuitbreaker.instances.edukacijaService.sliding-window-size=3
resilience4j.circuitbreaker.instances.edukacijaService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.edukacijaService.wait-duration-in-open-state=10s

resilience4j.retry.instances.novostRetry.max-attempts=2
resilience4j.retry.instances.novostRetry.wait-duration=5s

resilience4j.ratelimiter.instances.prijavaLimiter.limit-for-period=2
resilience4j.ratelimiter.instances.prijavaLimiter.limit-refresh-period=30s
#resilience4j.ratelimiter.instances.prijavaLimiter.timeout-duration=0



#spring.datasource.url=jdbc:mysql://localhost:3306/servis_edukacija
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/servis_edukacija
spring.datasource.username=root
spring.datasource.password=projekatFaks
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.datasource.hikari.maximum-pool-size=2